<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="1024" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a3a0a"/>
      <stop offset="100%" style="stop-color:#2d5016"/>
    </linearGradient>
    <linearGradient id="shield" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#4CAF50"/>
      <stop offset="100%" style="stop-color:#2E7D32"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="1024" height="1024" rx="220" fill="url(#bg2)"/>
  <!-- Decorative circle -->
  <circle cx="512" cy="420" r="300" fill="none" stroke="rgba(255,255,255,0.06)" stroke-width="40"/>
  <!-- Shield shape -->
  <path d="M512 140 L740 240 L740 460 Q740 620 512 750 Q284 620 284 460 L284 240Z" fill="url(#shield)" opacity="0.9"/>
  <path d="M512 170 L710 260 L710 450 Q710 600 512 720 Q314 600 314 450 L314 260Z" fill="none" stroke="rgba(255,255,255,0.2)" stroke-width="3"/>
  <!-- Sheep in shield -->
  <g transform="translate(512, 380)">
    <!-- Body -->
    <ellipse cx="0" cy="20" rx="90" ry="60" fill="white"/>
    <!-- Wool texture -->
    <circle cx="-50" cy="0" r="25" fill="white"/>
    <circle cx="-25" cy="-20" r="28" fill="white"/>
    <circle cx="10" cy="-25" r="26" fill="white"/>
    <circle cx="45" cy="-18" r="24" fill="white"/>
    <circle cx="60" cy="5" r="22" fill="white"/>
    <circle cx="-60" cy="20" r="20" fill="white"/>
    <!-- Head -->
    <ellipse cx="-85" cy="-10" rx="32" ry="28" fill="#F5F0E0"/>
    <!-- Eye -->
    <circle cx="-95" cy="-18" r="8" fill="#333"/>
    <circle cx="-93" cy="-20" r="3" fill="white"/>
    <!-- Ear -->
    <ellipse cx="-110" cy="-30" rx="12" ry="8" fill="#E0D5C0" transform="rotate(-20 -110 -30)"/>
    <!-- Nose -->
    <ellipse cx="-105" cy="0" rx="8" ry="5" fill="#C49555"/>
    <!-- Legs -->
    <rect x="-40" y="65" width="10" height="35" rx="4" fill="#8B7355"/>
    <rect x="-15" y="65" width="10" height="35" rx="4" fill="#8B7355"/>
    <rect x="20" y="65" width="10" height="35" rx="4" fill="#8B7355"/>
    <rect x="45" y="65" width="10" height="35" rx="4" fill="#8B7355"/>
  </g>
  <!-- Text -->
  <text x="512" y="820" font-family="Arial, sans-serif" font-size="90" font-weight="900" fill="white" text-anchor="middle" letter-spacing="6">МАЛЧИН</text>
  <text x="512" y="880" font-family="Arial, sans-serif" font-size="32" font-weight="400" fill="rgba(255,255,255,0.6)" text-anchor="middle" letter-spacing="8">SUPER APP</text>
</svg>
