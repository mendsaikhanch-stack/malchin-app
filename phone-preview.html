<!DOCTYPE html>
<html lang="mn">
<head>
<meta charset="UTF-8">
<title>МАЛЧИН - Утасны харагдац</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%); min-height: 100vh; display: flex; flex-direction: column; align-items: center; font-family: -apple-system, 'Segoe UI', sans-serif; color: white; overflow-x: hidden; }

h1 { margin-top: 24px; font-size: 22px; font-weight: 700; letter-spacing: 2px; }
.subtitle { color: #8bc34a; font-size: 13px; margin-bottom: 16px; }

.nav-bar { display: flex; gap: 8px; margin-bottom: 20px; flex-wrap: wrap; justify-content: center; padding: 0 16px; }
.nav-btn { padding: 7px 14px; border: 1px solid rgba(255,255,255,0.2); border-radius: 20px; background: rgba(255,255,255,0.08); color: #ccc; font-size: 12px; cursor: pointer; transition: all 0.2s; text-decoration: none; }
.nav-btn:hover, .nav-btn.active { background: #4a7c28; color: white; border-color: #4a7c28; }

.phones { display: flex; gap: 40px; justify-content: center; flex-wrap: wrap; padding: 0 20px 40px; }

.phone-wrap { text-align: center; }
.phone-label { font-size: 13px; color: #8bc34a; margin-bottom: 10px; font-weight: 600; }

.phone {
  width: 320px; height: 650px;
  border-radius: 44px;
  background: #111;
  padding: 12px;
  box-shadow: 0 20px 60px rgba(0,0,0,0.5), inset 0 0 0 2px #333, 0 0 0 1px #000;
  position: relative;
}
.phone::before {
  content: '';
  position: absolute;
  top: 12px; left: 50%; transform: translateX(-50%);
  width: 100px; height: 28px;
  background: #111;
  border-radius: 0 0 16px 16px;
  z-index: 10;
}
.phone-screen {
  width: 100%; height: 100%;
  border-radius: 34px;
  overflow: hidden;
  background: white;
}
.phone-screen iframe {
  width: 100%; height: 100%;
  border: none;
  border-radius: 34px;
}

@media (max-width: 768px) {
  .phones { gap: 20px; }
  .phone { width: 280px; height: 570px; border-radius: 36px; padding: 10px; }
  .phone-screen { border-radius: 28px; }
  .phone-screen iframe { border-radius: 28px; }
}
</style>
</head>
<body>

<h1>МАЛЧИН</h1>
<p class="subtitle">Монгол малчны super app</p>

<div class="nav-bar">
  <a class="nav-btn active" onclick="navigate('/', this)">Нүүр</a>
  <a class="nav-btn" onclick="navigate('/livestock', this)">Мал бүртгэл</a>
  <a class="nav-btn" onclick="navigate('/breeding', this)">Хээлтүүлэг</a>
  <a class="nav-btn" onclick="navigate('/health', this)">Эрүүл мэнд</a>
  <a class="nav-btn" onclick="navigate('/pasture', this)">Бэлчээр</a>
  <a class="nav-btn" onclick="navigate('/market', this)">Зах зээл</a>
  <a class="nav-btn" onclick="navigate('/news', this)">Мэдээ</a>
  <a class="nav-btn" onclick="navigate('/manage', this)">Удирдлага</a>
  <a class="nav-btn" onclick="navigate('/weather', this)">Цаг агаар</a>
  <a class="nav-btn" onclick="navigate('/diagnose', this)">AI Оношлогч</a>
  <a class="nav-btn" onclick="navigate('/profile', this)">Профайл</a>
</div>

<div class="phones">
  <div class="phone-wrap">
    <div class="phone-label" id="screen-label">Нүүр хуудас</div>
    <div class="phone">
      <div class="phone-screen">
        <iframe id="phone-frame" src="http://localhost:8081/"></iframe>
      </div>
    </div>
  </div>
</div>

<script>
function navigate(path, btn) {
  document.getElementById('phone-frame').src = 'http://localhost:8081' + path;
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('screen-label').textContent = btn.textContent;
}
</script>
</body>
</html>
