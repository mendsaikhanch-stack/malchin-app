<!DOCTYPE html>
<html lang="mn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MALCHIN Dashboard</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; font-family: Arial, sans-serif; }
body { background: #f5f0e8; color: #333; }
.header { background: #2d5016; color: white; padding: 20px; text-align: center; }
.header h1 { font-size: 28px; }
.container { max-width: 1200px; margin: 0 auto; padding: 20px; }
.grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 16px; margin-bottom: 20px; }
.card { background: white; border-radius: 14px; padding: 20px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
.card h3 { color: #2d5016; margin-bottom: 12px; }
.stat-row { display: flex; justify-content: space-around; text-align: center; }
.stat-item { padding: 10px; }
.stat-num { font-size: 32px; font-weight: bold; color: #2d5016; }
.stat-label { font-size: 13px; color: #888; }
.weather-temp { font-size: 48px; font-weight: bold; color: #1b5e20; }
.alert-item { padding: 10px; margin: 6px 0; border-radius: 8px; border-left: 4px solid; }
.alert-orange { border-color: #f44336; background: #fff3e0; }
.alert-yellow { border-color: #ff9800; background: #fffde7; }
.alert-red { border-color: #b71c1c; background: #ffebee; }
.tip-box { background: #fff3e0; padding: 16px; border-radius: 10px; font-size: 15px; line-height: 1.6; }
.market-item { padding: 12px; border-bottom: 1px solid #eee; display: flex; justify-content: space-between; }
.price { color: #e65100; font-weight: bold; font-size: 18px; }
.btn { background: #2d5016; color: white; border: none; padding: 10px 20px; border-radius: 8px; cursor: pointer; font-size: 14px; }
.btn:hover { background: #1b3a0e; }
.income { color: #2e7d32; } .expense { color: #c62828; }
.finance-summary { display: flex; gap: 20px; margin-bottom: 16px; }
.finance-box { flex: 1; text-align: center; padding: 16px; border-radius: 10px; }
.ai-input { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px; font-size: 15px; margin-bottom: 10px; }
#ai-answer { background: #f5f5f5; padding: 14px; border-radius: 8px; margin-top: 10px; min-height: 40px; line-height: 1.6; }
</style>
</head>
<body>
<div class="header"><h1>MALCHIN Dashboard</h1><p>Malchnii super app admin panel</p></div>
<div class="container">
<div class="grid">
<div class="card"><h3>Maliin burtgel</h3><div class="stat-row" id="livestock-stats"><p>Loading...</p></div></div>
<div class="card"><h3>Tsag agaar - Arkhangai</h3><div id="weather-info"><p>Loading...</p></div></div>
<div class="card"><h3>AI zuvluguu</h3><div class="tip-box" id="ai-tip">Loading...</div></div>
</div>
<div class="grid">
<div class="card"><h3>Zakh zeeliin zarууд</h3><div id="market-list"><p>Loading...</p></div></div>
<div class="card"><h3>Ayuuliin medeelel</h3><div id="alerts-list"><p>Loading...</p></div></div>
<div class="card"><h3>AI malchnii zuvlukh</h3><input class="ai-input" id="ai-q" placeholder="Asuultaa bichne uu..."><button class="btn" onclick="askAI()">Asuukh</button><div id="ai-answer"></div></div>
</div>
<div class="grid">
<div class="card"><h3>Sankhuu</h3>
<div class="finance-summary">
<div class="finance-box" style="background:#e8f5e9"><p>Orlogo</p><p class="income" id="f-income" style="font-size:22px;font-weight:bold">0</p></div>
<div class="finance-box" style="background:#ffebee"><p>Zardal</p><p class="expense" id="f-expense" style="font-size:22px;font-weight:bold">0</p></div>
<div class="finance-box" style="background:#fff"><p>Ashig</p><p id="f-profit" style="font-size:22px;font-weight:bold">0</p></div>
</div></div>
<div class="card"><h3>Khereglegchid</h3><div id="users-list"><p>Loading...</p></div></div>
</div>
</div>
<script>
const API = "http://localhost:5000";
async function load() {
try { const r = await fetch(API+"/livestock/stats/1"); const d = await r.json(); document.getElementById("livestock-stats").innerHTML = d.livestock.map(l => "<div class=stat-item><div class=stat-num>"+l.total_count+"</div><div class=stat-label>"+l.animal_type+"</div></div>").join("") + "<div class=stat-item><div class=stat-num style=color:#e65100>"+d.total_animals+"</div><div class=stat-label>NIIT</div></div>"; } catch(e) { document.getElementById("livestock-stats").innerHTML = "Server ajilagui baina"; }
try { const r = await fetch(API+"/weather/Arkhangai"); const d = await r.json(); document.getElementById("weather-info").innerHTML = "<div class=weather-temp>"+d.temp+"C</div><p>"+d.condition+" | Salkhi: "+d.wind+"m/s</p><p>Zud ersdel: "+d.dzud_risk+"</p>"; } catch(e) {}
try { const r = await fetch(API+"/ai/tips"); const d = await r.json(); document.getElementById("ai-tip").textContent = d.tip; } catch(e) {}
try { const r = await fetch(API+"/market"); const d = await r.json(); document.getElementById("market-list").innerHTML = d.length ? d.map(m => "<div class=market-item><div><b>"+m.title+"</b><br><small>"+m.location+"</small></div><div class=price>"+m.price+"T</div></div>").join("") : "<p>Zar baitgui</p>"; } catch(e) {}
try { const r = await fetch(API+"/alerts"); const d = await r.json(); document.getElementById("alerts-list").innerHTML = d.map(a => "<div class=\"alert-item alert-"+a.severity+"\"><b>"+a.title+"</b><br><small>"+a.region+"</small></div>").join(""); } catch(e) {}
try { const r = await fetch(API+"/finance/summary/1"); const d = await r.json(); document.getElementById("f-income").textContent = d.total_income+"T"; document.getElementById("f-expense").textContent = d.total_expense+"T"; document.getElementById("f-profit").textContent = d.profit+"T"; } catch(e) {}
try { const r = await fetch(API+"/users"); const d = await r.json(); document.getElementById("users-list").innerHTML = d.map(u => "<p>"+u.name+" | "+u.phone+" | "+u.aimag+"</p>").join(""); } catch(e) {}
}
async function askAI() { const q = document.getElementById("ai-q").value; if(!q) return; try { const r = await fetch(API+"/ai/ask", { method:"POST", headers:{"Content-Type":"application/json"}, body: JSON.stringify({question:q}) }); const d = await r.json(); document.getElementById("ai-answer").textContent = d.answer; } catch(e) { document.getElementById("ai-answer").textContent = "Aldaa garlaa"; } }
load();
</script>
</body>
</html>
